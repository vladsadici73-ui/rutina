<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RUTINĂ — Planner săptămânal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A1420;
    --bg-deep:#060B12;
    --panel:#0F1F33;
    --panel-alt:#13273F;
    --panel-hi:#17304C;
    --grid-line:rgba(110,178,224,0.09);
    --grid-line-strong:rgba(110,178,224,0.18);
    --cyan:#52D7E0;
    --cyan-dim:rgba(82,215,224,0.28);
    --amber:#F2A65A;
    --text:#E7F1F7;
    --text-muted:#7C93AB;
    --text-faint:#4C6178;
    --danger:#E86BD0;
    --ok:#7EE787;
    --radius:14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 800px at 15% -10%, rgba(82,215,224,0.06), transparent 60%),
      radial-gradient(900px 700px at 110% 10%, rgba(242,166,90,0.05), transparent 55%),
      var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans', -apple-system, sans-serif;
    overflow:hidden;
    height:100vh;
    height:100dvh;
  }
  .blueprint-grid{
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 34px 34px;
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.35) 70%, transparent);
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.9), rgba(0,0,0,0.35) 70%, transparent);
  }
  #app{position:relative; z-index:1; height:100%; display:flex; flex-direction:column;}

  /* ---------- storage banner ---------- */
  .storage-banner{
    display:none;
    background:var(--amber); color:#1a1206;
    font-family:'IBM Plex Mono',monospace;
    font-size:12px; font-weight:600; letter-spacing:.02em;
    text-align:center; padding:7px 12px;
  }
  .storage-banner.show{display:block;}

  /* ---------- top bar ---------- */
  header.topbar{
    padding: calc(14px + var(--safe-top)) 18px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    border-bottom:1px solid var(--grid-line-strong);
    flex-shrink:0;
  }
  .brand{display:flex; align-items:baseline; gap:8px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan); box-shadow:0 0 8px 1px var(--cyan-dim); display:inline-block;}
  .brand h1{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:19px;
    letter-spacing:.06em; margin:0; color:var(--text);
  }
  .brand small{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--text-faint);
    letter-spacing:.08em; text-transform:uppercase;
  }
  .tabswitch{
    display:flex; background:var(--panel); border-radius:10px; padding:3px;
    border:1px solid var(--grid-line-strong); flex-shrink:0;
  }
  .tabswitch button{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase;
    padding:8px 14px; border:none; border-radius:7px; background:transparent;
    color:var(--text-muted); cursor:pointer; transition:all .15s ease;
  }
  .tabswitch button.active{background:var(--panel-hi); color:var(--cyan);}

  /* ---------- week nav ---------- */
  .weeknav{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; flex-shrink:0; gap:10px;
  }
  .weeknav .range{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-muted);
    letter-spacing:.03em;
  }
  .navbtns{display:flex; gap:8px; align-items:center;}
  .iconbtn{
    width:36px;height:36px; border-radius:9px; border:1px solid var(--grid-line-strong);
    background:var(--panel); color:var(--cyan); font-size:16px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .iconbtn:active{background:var(--panel-hi);}
  .todaybtn{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600;
    letter-spacing:.05em; text-transform:uppercase;
    padding:0 12px; height:36px; border-radius:9px; border:1px solid var(--cyan-dim);
    background:transparent; color:var(--cyan); cursor:pointer;
  }

  /* ---------- day tab strip ---------- */
  .daystrip{
    display:flex; gap:8px; padding:0 18px 12px; overflow-x:auto; flex-shrink:0;
    scrollbar-width:none;
  }
  .daystrip::-webkit-scrollbar{display:none;}
  .daychip{
    flex:0 0 auto; min-width:58px; padding:8px 6px 9px; border-radius:11px;
    background:var(--panel); border:1px solid var(--grid-line-strong);
    display:flex; flex-direction:column; align-items:center; gap:5px;
    cursor:pointer; color:var(--text-muted);
  }
  .daychip.active{background:var(--panel-hi); border-color:var(--cyan-dim); color:var(--cyan);}
  .daychip.istoday .num{color:var(--amber);}
  .daychip .abbr{font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase;}
  .daychip .num{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; color:var(--text);}
  .segbar{display:flex; gap:2px; height:4px; margin-top:1px;}
  .segbar i{width:5px; height:4px; border-radius:1px; background:var(--grid-line-strong); display:block;}
  .segbar i.done{background:var(--cyan); box-shadow:0 0 4px var(--cyan-dim);}

  /* ---------- carousel ---------- */
  .carousel{
    flex:1; display:flex; overflow-x:auto; scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
  }
  .carousel::-webkit-scrollbar{display:none;}
  .daypage{
    flex:0 0 100%; scroll-snap-align:start; overflow-y:auto;
    padding:4px 18px calc(24px + var(--safe-bottom));
  }
  .daycard-head{
    display:flex; align-items:baseline; justify-content:space-between; margin:10px 0 14px;
    padding-bottom:10px; border-bottom:1px dashed var(--grid-line-strong);
  }
  .daycard-head h2{
    font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:600; margin:0;
  }
  .daycard-head .datesub{font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--text-faint); margin-top:2px;}
  .progresstag{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--cyan);
    background:var(--panel); border:1px solid var(--cyan-dim); border-radius:20px; padding:5px 11px;
  }

  .tasklist{display:flex; flex-direction:column; gap:8px; margin-bottom:16px;}
  .taskrow{
    position:relative; display:flex; align-items:center; gap:11px;
    background:var(--panel); border:1px solid var(--grid-line-strong); border-radius:var(--radius);
    padding:12px 12px 12px 14px; overflow:hidden;
  }
  .taskrow::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--wire, var(--text-faint));
  }
  .taskrow.done{opacity:.55;}
  .taskrow.done .tname{text-decoration:line-through; text-decoration-color:var(--text-faint);}
  .checkbox{
    width:24px;height:24px; border-radius:7px; border:2px solid var(--grid-line-strong);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:var(--bg-deep);
  }
  .taskrow.done .checkbox{background:var(--cyan); border-color:var(--cyan);}
  .checkbox svg{width:14px;height:14px; opacity:0; transition:opacity .1s;}
  .taskrow.done .checkbox svg{opacity:1;}
  .tname{flex:1; font-size:14.5px; font-weight:500; line-height:1.3;}
  .trow-x{
    width:26px;height:26px; border-radius:7px; border:none; background:transparent;
    color:var(--text-faint); font-size:15px; cursor:pointer; flex-shrink:0;
  }
  .trow-x:active{color:var(--danger);}

  .addtask{
    display:flex; gap:8px; margin-bottom:22px;
  }
  .addtask input{
    flex:1; background:var(--panel-alt); border:1px solid var(--grid-line-strong);
    border-radius:var(--radius); padding:12px 14px; color:var(--text); font-size:14.5px;
    font-family:'IBM Plex Sans',sans-serif;
  }
  .addtask input::placeholder{color:var(--text-faint);}
  .addtask button{
    background:var(--cyan); color:#052226; border:none; border-radius:var(--radius);
    padding:0 18px; font-weight:600; font-size:14px; cursor:pointer;
  }

  .empty-note{
    font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-faint);
    text-align:center; padding:26px 10px; border:1px dashed var(--grid-line-strong); border-radius:var(--radius);
  }

  /* ---------- routines screen ---------- */
  .routinescreen{
    flex:1; overflow-y:auto; padding:4px 18px calc(24px + var(--safe-bottom)); display:none;
  }
  .routinescreen.show{display:block;}
  .carousel.hide, .daystrip.hide, .weeknav.hide{display:none;}

  .sectionlabel{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--text-faint); margin:18px 0 10px;
  }
  .newroutine{
    background:var(--panel); border:1px solid var(--grid-line-strong); border-radius:var(--radius);
    padding:14px; margin-top:8px;
  }
  .newroutine input[type=text]{
    width:100%; background:var(--panel-alt); border:1px solid var(--grid-line-strong);
    border-radius:10px; padding:12px 13px; color:var(--text); font-size:14.5px;
    font-family:'IBM Plex Sans',sans-serif; margin-bottom:12px;
  }
  .daypicker{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;}
  .daypick{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600;
    width:38px; height:38px; border-radius:9px; border:1px solid var(--grid-line-strong);
    background:var(--panel-alt); color:var(--text-muted); cursor:pointer;
  }
  .daypick.on{background:var(--cyan-dim); border-color:var(--cyan); color:var(--cyan);}
  .dailybtn{
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; font-weight:600;
    padding:0 12px; height:38px; border-radius:9px; border:1px solid var(--grid-line-strong);
    background:var(--panel-alt); color:var(--text-muted); cursor:pointer;
  }
  .dailybtn.on{background:var(--amber); border-color:var(--amber); color:#1a1206;}
  .wirepicker{display:flex; gap:9px; margin-bottom:14px; align-items:center;}
  .wirepicker .wlabel{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-faint); margin-right:2px;}
  .wswatch{
    width:26px;height:26px; border-radius:50%; border:2px solid transparent; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .wswatch.sel{border-color:#fff;}
  .wswatch i{width:14px;height:14px;border-radius:50%; display:block;}
  .addbtn-full{
    width:100%; background:var(--cyan); color:#052226; border:none; border-radius:10px;
    padding:12px; font-weight:700; font-size:14px; cursor:pointer; letter-spacing:.02em;
  }

  .routinelist{display:flex; flex-direction:column; gap:8px; margin-top:8px;}
  .routineitem{
    background:var(--panel); border:1px solid var(--grid-line-strong); border-radius:var(--radius);
    padding:12px 14px; position:relative; overflow:hidden;
  }
  .routineitem::before{
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--wire, var(--text-faint));
  }
  .ritop{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .ritop .rname{font-size:14.5px; font-weight:600;}
  .ridays{
    font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-muted); margin-top:5px; letter-spacing:.04em;
  }

  ::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div class="blueprint-grid"></div>
<div id="app">
  <div class="storage-banner" id="storageBanner">MOD PREVIZUALIZARE — datele nu se salvează aici. Descarcă fișierul și deschide-l în Safari pentru salvare locală permanentă.</div>

  <header class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>RUTINĂ</h1><br>
        <small id="todayLabel">—</small>
      </div>
    </div>
    <div class="tabswitch">
      <button id="tabWeek" class="active">Săptămână</button>
      <button id="tabRoutines">Rutine</button>
    </div>
  </header>

  <div class="weeknav" id="weeknav">
    <div class="navbtns">
      <button class="iconbtn" id="prevWeek">‹</button>
      <button class="iconbtn" id="nextWeek">›</button>
    </div>
    <div class="range" id="weekRange">—</div>
    <button class="todaybtn" id="gotoToday">Azi</button>
  </div>

  <div class="daystrip" id="daystrip"></div>

  <div class="carousel" id="carousel"></div>

  <div class="routinescreen" id="routinescreen">
    <div class="sectionlabel">Adaugă task recurent</div>
    <div class="newroutine">
      <input type="text" id="rname" placeholder="Ex: Antrenament, temă la fizică, hrănit câinele...">
      <div class="daypicker" id="daypicker"></div>
      <div style="display:flex; gap:8px; margin-bottom:14px;">
        <button class="dailybtn" id="dailyToggle">ZILNIC</button>
      </div>
      <div class="wirepicker" id="wirepicker">
        <span class="wlabel">CULOARE</span>
      </div>
      <button class="addbtn-full" id="addRoutineBtn">+ Adaugă în rutină</button>
    </div>

    <div class="sectionlabel">Task-uri active</div>
    <div class="routinelist" id="routinelist"></div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const KEY = 'rutina_app_data_v1';
  const DAY_ABBR = ['LU','MA','MI','JO','VI','SÂ','DU'];
  const DAY_FULL = ['Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă','Duminică'];
  const WIRES = [
    {id:'cyan', hex:'#52D7E0'},
    {id:'amber', hex:'#F2A65A'},
    {id:'magenta', hex:'#E86BD0'},
    {id:'green', hex:'#7EE787'},
    {id:'violet', hex:'#9B8CFF'},
  ];

  /* ---------- storage layer ---------- */
  let storageAvailable = true;
  try{
    localStorage.setItem('__t','1');
    localStorage.removeItem('__t');
  }catch(e){ storageAvailable = false; }
  let memFallback = null;

  function loadData(){
    let raw = null;
    if(storageAvailable){
      try{ raw = localStorage.getItem(KEY); }catch(e){}
    } else {
      raw = memFallback;
    }
    if(!raw){
      return { routines: [], oneOff: {}, completions: {} };
    }
    try{ return JSON.parse(raw); }
    catch(e){ return { routines: [], oneOff: {}, completions: {} }; }
  }
  function saveData(){
    const raw = JSON.stringify(state.data);
    if(storageAvailable){
      try{ localStorage.setItem(KEY, raw); }
      catch(e){ storageAvailable = false; memFallback = raw; showBanner(); }
    } else {
      memFallback = raw;
    }
  }
  function showBanner(){ document.getElementById('storageBanner').classList.add('show'); }
  if(!storageAvailable) showBanner();

  /* ---------- date helpers ---------- */
  function pad(n){ return n<10 ? '0'+n : ''+n; }
  function dateKey(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function mondayOf(d){
    const x = new Date(d);
    const jsDay = x.getDay(); // 0 sun .. 6 sat
    const myIdx = (jsDay+6)%7; // 0 mon .. 6 sun
    x.setDate(x.getDate()-myIdx);
    x.setHours(0,0,0,0);
    return x;
  }
  function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
  function sameDate(a,b){ return dateKey(a)===dateKey(b); }
  function myDow(d){ return (d.getDay()+6)%7; }

  /* ---------- state ---------- */
  const state = {
    data: loadData(),
    weekMonday: mondayOf(new Date()),
    activeDayIdx: myDow(new Date()),
    tab: 'week',
    newRoutineDays: new Set(),
    newRoutineWire: 'cyan',
  };

  /* ---------- rendering ---------- */
  const daystripEl = document.getElementById('daystrip');
  const carouselEl = document.getElementById('carousel');
  const weekRangeEl = document.getElementById('weekRange');
  const todayLabelEl = document.getElementById('todayLabel');
  const routinescreenEl = document.getElementById('routinescreen');
  const routinelistEl = document.getElementById('routinelist');

  function tasksForDate(d){
    const key = dateKey(d);
    const dow = myDow(d);
    const routineTasks = state.data.routines
      .filter(r => r.days.includes(dow))
      .map(r => ({ key:'r_'+r.id, id:r.id, name:r.name, wire:r.wire, kind:'routine' }));
    const oneOff = (state.data.oneOff[key] || [])
      .map(t => ({ key:'o_'+t.id, id:t.id, name:t.name, wire:null, kind:'oneoff' }));
    return routineTasks.concat(oneOff);
  }
  function isDone(dateK, taskKey){
    return !!(state.data.completions[dateK] && state.data.completions[dateK][taskKey]);
  }
  function toggleDone(dateK, taskKey){
    if(!state.data.completions[dateK]) state.data.completions[dateK] = {};
    state.data.completions[dateK][taskKey] = !state.data.completions[dateK][taskKey];
    saveData();
    renderAll();
  }

  function wireHex(id){
    const w = WIRES.find(w=>w.id===id);
    return w ? w.hex : null;
  }

  function renderTopLabel(){
    const now = new Date();
    todayLabelEl.textContent = DAY_FULL[myDow(now)].toUpperCase()+' · '+pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear();
  }

  function renderWeekRange(){
    const start = state.weekMonday;
    const end = addDays(start,6);
    const fmt = (d)=> pad(d.getDate())+'.'+pad(d.getMonth()+1);
    weekRangeEl.textContent = fmt(start)+' — '+fmt(end);
  }

  function renderDaystrip(){
    daystripEl.innerHTML = '';
    for(let i=0;i<7;i++){
      const d = addDays(state.weekMonday, i);
      const tasks = tasksForDate(d);
      const k = dateKey(d);
      const doneCount = tasks.filter(t=>isDone(k,t.key)).length;
      const chip = document.createElement('div');
      chip.className = 'daychip'+(i===state.activeDayIdx?' active':'')+(sameDate(d,new Date())?' istoday':'');
      chip.innerHTML = `
        <span class="abbr">${DAY_ABBR[i]}</span>
        <span class="num">${d.getDate()}</span>
        <span class="segbar">${tasks.slice(0,7).map((t,idx)=>`<i class="${idx<doneCount?'done':''}"></i>`).join('') || '<i></i><i></i><i></i>'}</span>
      `;
      chip.addEventListener('click', ()=>{
        state.activeDayIdx = i;
        scrollCarouselTo(i);
        renderDaystrip();
      });
      daystripEl.appendChild(chip);
    }
  }

  function taskRowHTML(t, k){
    const done = isDone(k, t.key);
    const wireStyle = t.wire ? `style="--wire:${wireHex(t.wire)}"` : '';
    return `
      <div class="taskrow ${done?'done':''}" ${wireStyle} data-key="${t.key}">
        <div class="checkbox" data-action="toggle">
          <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#052226" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="tname">${escapeHTML(t.name)}</div>
        ${t.kind==='oneoff' ? `<button class="trow-x" data-action="delete">✕</button>` : ''}
      </div>
    `;
  }

  function escapeHTML(s){
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function renderCarousel(){
    carouselEl.innerHTML = '';
    for(let i=0;i<7;i++){
      const d = addDays(state.weekMonday, i);
      const k = dateKey(d);
      const tasks = tasksForDate(d);
      const doneCount = tasks.filter(t=>isDone(k,t.key)).length;
      const page = document.createElement('div');
      page.className = 'daypage';
      page.dataset.idx = i;
      page.innerHTML = `
        <div class="daycard-head">
          <div>
            <h2>${DAY_FULL[i]}</h2>
            <div class="datesub">${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}</div>
          </div>
          <div class="progresstag">${doneCount}/${tasks.length}</div>
        </div>
        <div class="tasklist">
          ${tasks.length ? tasks.map(t=>taskRowHTML(t,k)).join('') : `<div class="empty-note">NICIUN TASK PROGRAMAT — adaugă unul mai jos</div>`}
        </div>
        <div class="addtask">
          <input type="text" placeholder="Task nou pentru ${DAY_FULL[i]}..." data-add-input="${k}">
          <button data-add-btn="${k}">Adaugă</button>
        </div>
      `;
      carouselEl.appendChild(page);
    }
    attachCarouselEvents();
  }

  function attachCarouselEvents(){
    carouselEl.querySelectorAll('.checkbox[data-action="toggle"]').forEach(cb=>{
      cb.addEventListener('click', ()=>{
        const row = cb.closest('.taskrow');
        const page = cb.closest('.daypage');
        const idx = parseInt(page.dataset.idx,10);
        const k = dateKey(addDays(state.weekMonday, idx));
        toggleDone(k, row.dataset.key);
      });
    });
    carouselEl.querySelectorAll('.trow-x[data-action="delete"]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const row = btn.closest('.taskrow');
        const page = btn.closest('.daypage');
        const idx = parseInt(page.dataset.idx,10);
        const k = dateKey(addDays(state.weekMonday, idx));
        const taskId = row.dataset.key.replace('o_','');
        state.data.oneOff[k] = (state.data.oneOff[k]||[]).filter(t=>t.id!==taskId);
        saveData();
        renderAll();
      });
    });
    carouselEl.querySelectorAll('[data-add-btn]').forEach(btn=>{
      const commit = ()=>{
        const k = btn.dataset.addBtn;
        const input = carouselEl.querySelector(`[data-add-input="${k}"]`);
        const val = input.value.trim();
        if(!val) return;
        if(!state.data.oneOff[k]) state.data.oneOff[k] = [];
        state.data.oneOff[k].push({ id: 't'+Date.now()+Math.random().toString(16).slice(2), name: val });
        saveData();
        renderAll();
        // refocus the corresponding input after re-render
        requestAnimationFrame(()=>{
          const idx = state.activeDayIdx;
          scrollCarouselTo(idx, false);
        });
      };
      btn.addEventListener('click', commit);
    });
    carouselEl.querySelectorAll('[data-add-input]').forEach(inp=>{
      inp.addEventListener('keydown', (e)=>{
        if(e.key==='Enter'){
          const k = inp.dataset.addInput;
          carouselEl.querySelector(`[data-add-btn="${k}"]`).click();
        }
      });
    });
    carouselEl.addEventListener('scroll', onCarouselScroll, {passive:true});
  }

  let scrollTimer = null;
  function onCarouselScroll(){
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(()=>{
      const idx = Math.round(carouselEl.scrollLeft / carouselEl.clientWidth);
      if(idx !== state.activeDayIdx && idx>=0 && idx<7){
        state.activeDayIdx = idx;
        renderDaystrip();
      }
    }, 80);
  }

  function scrollCarouselTo(idx, smooth){
    const page = carouselEl.children[idx];
    if(page) page.scrollIntoView({behavior: smooth===false?'auto':'smooth', inline:'start', block:'nearest'});
  }

  /* ---------- routines screen ---------- */
  function renderDaypicker(){
    const el = document.getElementById('daypicker');
    el.innerHTML = '';
    DAY_ABBR.forEach((abbr,i)=>{
      const b = document.createElement('button');
      b.className = 'daypick'+(state.newRoutineDays.has(i)?' on':'');
      b.textContent = abbr;
      b.type = 'button';
      b.addEventListener('click', ()=>{
        if(state.newRoutineDays.has(i)) state.newRoutineDays.delete(i);
        else state.newRoutineDays.add(i);
        renderDaypicker();
        syncDailyBtn();
      });
      el.appendChild(b);
    });
  }
  function syncDailyBtn(){
    const btn = document.getElementById('dailyToggle');
    btn.classList.toggle('on', state.newRoutineDays.size===7);
  }
  document.getElementById('dailyToggle').addEventListener('click', ()=>{
    if(state.newRoutineDays.size===7) state.newRoutineDays.clear();
    else { state.newRoutineDays = new Set([0,1,2,3,4,5,6]); }
    renderDaypicker();
    syncDailyBtn();
  });

  function renderWirepicker(){
    const el = document.getElementById('wirepicker');
    el.querySelectorAll('.wswatch').forEach(n=>n.remove());
    WIRES.forEach(w=>{
      const b = document.createElement('button');
      b.className = 'wswatch'+(state.newRoutineWire===w.id?' sel':'');
      b.type='button';
      b.innerHTML = `<i style="background:${w.hex}"></i>`;
      b.addEventListener('click', ()=>{
        state.newRoutineWire = w.id;
        renderWirepicker();
      });
      el.appendChild(b);
    });
  }

  document.getElementById('addRoutineBtn').addEventListener('click', ()=>{
    const input = document.getElementById('rname');
    const name = input.value.trim();
    if(!name){ input.focus(); return; }
    if(state.newRoutineDays.size===0){ return; }
    state.data.routines.push({
      id: 'rt'+Date.now()+Math.random().toString(16).slice(2),
      name, days: Array.from(state.newRoutineDays).sort(), wire: state.newRoutineWire
    });
    saveData();
    input.value='';
    state.newRoutineDays = new Set();
    state.newRoutineWire = 'cyan';
    renderDaypicker(); syncDailyBtn(); renderWirepicker();
    renderRoutineList();
    renderAll();
  });

  function renderRoutineList(){
    routinelistEl.innerHTML = '';
    if(state.data.routines.length===0){
      routinelistEl.innerHTML = `<div class="empty-note">NICIUN TASK RECURENT ÎNCĂ — adaugă primul mai sus</div>`;
      return;
    }
    state.data.routines.forEach(r=>{
      const daysLabel = r.days.length===7 ? 'ZILNIC' : r.days.map(i=>DAY_ABBR[i]).join(' · ');
      const item = document.createElement('div');
      item.className = 'routineitem';
      item.style.setProperty('--wire', wireHex(r.wire));
      item.innerHTML = `
        <div class="ritop">
          <div class="rname">${escapeHTML(r.name)}</div>
          <button class="trow-x" data-del="${r.id}">✕</button>
        </div>
        <div class="ridays">${daysLabel}</div>
      `;
      item.querySelector('[data-del]').addEventListener('click', ()=>{
        state.data.routines = state.data.routines.filter(x=>x.id!==r.id);
        saveData();
        renderRoutineList();
        renderAll();
      });
      routinelistEl.appendChild(item);
    });
  }

  /* ---------- nav events ---------- */
  document.getElementById('prevWeek').addEventListener('click', ()=>{
    state.weekMonday = addDays(state.weekMonday,-7);
    renderAll(); scrollCarouselTo(state.activeDayIdx,false);
  });
  document.getElementById('nextWeek').addEventListener('click', ()=>{
    state.weekMonday = addDays(state.weekMonday,7);
    renderAll(); scrollCarouselTo(state.activeDayIdx,false);
  });
  document.getElementById('gotoToday').addEventListener('click', ()=>{
    const now = new Date();
    state.weekMonday = mondayOf(now);
    state.activeDayIdx = myDow(now);
    renderAll();
    scrollCarouselTo(state.activeDayIdx,false);
  });

  const tabWeek = document.getElementById('tabWeek');
  const tabRoutines = document.getElementById('tabRoutines');
  tabWeek.addEventListener('click', ()=> setTab('week'));
  tabRoutines.addEventListener('click', ()=> setTab('routines'));
  function setTab(t){
    state.tab = t;
    tabWeek.classList.toggle('active', t==='week');
    tabRoutines.classList.toggle('active', t==='routines');
    document.getElementById('weeknav').classList.toggle('hide', t!=='week');
    document.getElementById('daystrip').classList.toggle('hide', t!=='week');
    carouselEl.classList.toggle('hide', t!=='week');
    routinescreenEl.classList.toggle('show', t==='routines');
    if(t==='week') requestAnimationFrame(()=>scrollCarouselTo(state.activeDayIdx,false));
  }

  function renderAll(){
    renderTopLabel();
    renderWeekRange();
    renderDaystrip();
    renderCarousel();
    renderRoutineList();
  }

  /* ---------- init ---------- */
  renderDaypicker();
  syncDailyBtn();
  renderWirepicker();
  renderAll();
  requestAnimationFrame(()=> scrollCarouselTo(state.activeDayIdx,false));

})();
</script>
</body>
</html>
