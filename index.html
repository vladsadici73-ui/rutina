<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Gentle Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Playpen+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--ink:#4c3e50;--muted:#8d7c8a;--cream:#fffaf5;--paper:#fffdfb;--lilac:#eee7ff;--pink:#ffe3ed;--peach:#ffe1c6;--butter:#fff0a6;--mint:#dff5e9;--line:#f0dfdc;--shadow:0 12px 32px rgba(157,105,123,.13);--safe:env(safe-area-inset-bottom,0px)}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(132deg,#fff7f3,#f8f0ff 48%,#fff9df);color:var(--ink);font-family:"Nunito",sans-serif;min-height:100dvh}
    body:before,body:after{content:"";position:fixed;border-radius:50%;filter:blur(2px);z-index:-1;opacity:.56}body:before{width:340px;height:340px;background:#ffc9de;left:-130px;top:20%;}body:after{width:390px;height:390px;background:#d9d0ff;right:-190px;top:-80px}
    button,input{font:inherit}button{cursor:pointer;border:0}.shell{width:min(100%,900px);margin:auto;padding:22px 20px calc(28px + var(--safe))}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:26px}.brand{display:flex;align-items:center;gap:10px}.flower{font-size:31px;filter:drop-shadow(0 5px 3px #f4bfd1)}h1{font:700 clamp(23px,5.4vw,35px) "Playpen Sans",cursive;letter-spacing:-.065em;margin:0;white-space:nowrap}.brand p{margin:1px 0 0;color:var(--muted);font-size:13px}.tabs{background:rgba(255,255,255,.72);padding:5px;border:1px solid rgba(255,255,255,.8);box-shadow:0 5px 14px rgba(166,120,135,.09);border-radius:18px;display:flex;gap:2px}.tabs button{padding:9px 12px;border-radius:13px;background:transparent;color:var(--muted);font-weight:800;font-size:13px}.tabs .active{color:#71536d;background:var(--pink)}
    .hero{position:relative;overflow:hidden;min-height:218px;border-radius:31px;padding:28px;background:linear-gradient(110deg,#ffdce8 0%,#ffe9d4 58%,#e7dfff);box-shadow:var(--shadow);isolation:isolate}.hero:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,237,230,.88) 0%,rgba(255,237,230,.7) 53%,rgba(255,237,230,.08) 72%);z-index:0}.hero-copy{width:min(55%,440px);max-width:none;position:relative;z-index:2}.eyebrow{display:inline-block;background:rgba(255,255,255,.66);padding:5px 10px;border-radius:999px;color:#9d667c;font-size:12px;font-weight:800}.hero h2{font:700 clamp(22px,4.6vw,34px)/1.12 "Playpen Sans",cursive;letter-spacing:-.055em;margin:13px 0 9px}.hero p{font-size:14px;font-weight:600;margin:0;color:#735c68;line-height:1.5}.cat-photo{position:absolute;right:0;bottom:0;height:100%;width:42%;object-fit:cover;object-position:67% 50%;mix-blend-mode:multiply;z-index:1;animation:cat-breathe 4.8s ease-in-out infinite}.paw{position:absolute;right:18%;bottom:14px;font-size:24px;z-index:2;animation:paw-wave 3.2s ease-in-out infinite;transform-origin:bottom center}.spark{position:absolute;font-size:20px;z-index:2;animation:twinkle 2.3s ease-in-out infinite}.s1{right:10%;top:20%}.s2{right:36%;top:18%;animation-delay:.6s}.s3{right:8%;bottom:20%;animation-delay:1.2s}@keyframes cat-breathe{50%{transform:translateY(-3px) scale(1.012)}}@keyframes paw-wave{20%,60%{transform:rotate(-15deg)}40%{transform:rotate(18deg)}0%,100%{transform:rotate(0)}}@keyframes twinkle{50%{transform:scale(1.4) rotate(15deg);opacity:.45}}
    .nav{margin:24px 0 13px;display:flex;justify-content:space-between;align-items:center}.nav h3{font:700 20px "Playpen Sans",cursive;margin:0}.nav-controls{display:flex;align-items:center;gap:8px}.round{width:37px;height:37px;border-radius:50%;background:var(--paper);box-shadow:0 4px 12px rgba(120,83,99,.1);color:#86667a;font-size:20px}.today{background:#725a71;color:white;padding:10px 14px;border-radius:14px;font-size:13px;font-weight:800}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;overflow:auto;padding:2px 1px 13px}.day{min-width:58px;padding:10px 4px;border:1px solid transparent;background:rgba(255,255,255,.65);border-radius:18px;text-align:center;color:var(--muted);transition:.2s}.day b{display:block;font-size:11px;letter-spacing:.06em}.day span{display:grid;place-items:center;width:30px;height:30px;margin:5px auto 0;border-radius:50%;font-weight:800;color:var(--ink)}.day.active{background:#fff;border-color:#f3d7e1;box-shadow:0 7px 15px rgba(161,105,128,.11)}.day.active span{background:#f4adc5;color:#fff}.day .dot{width:5px;height:5px;background:#b69aef;border-radius:50%;margin:5px auto -2px}.day.today b{color:#c47a94}
    .content{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(230px,.65fr);gap:18px}.panel{background:rgba(255,253,251,.86);border:1px solid rgba(255,255,255,.8);border-radius:25px;padding:19px;box-shadow:0 7px 22px rgba(151,107,121,.08)}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:13px}.panel h3{font:700 19px "Playpen Sans",cursive;margin:0}.count{color:#9e7689;background:#fdebf0;border-radius:99px;padding:5px 9px;font-size:12px;font-weight:800}.task{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px dashed #f0dcdf}.task:last-of-type{border:0}.check{width:24px;height:24px;border:2px solid #eac7d5;border-radius:9px;background:#fff;flex:none}.task.done .check{background:#a8dcbf;border-color:#a8dcbf}.task.done .check:after{content:"✓";color:#fff;font-weight:700;margin-left:4px}.task.done .name{text-decoration:line-through;color:#a6959d}.name{flex:1;font-size:14px;font-weight:700}.tag{padding:5px 8px;border-radius:99px;font-size:11px;font-weight:800;background:var(--lilac);color:#7e6aa9}.task:nth-child(3) .tag{background:#ffe8ba;color:#a77a35}.task:nth-child(4) .tag{background:#dbf4e5;color:#548d70}.remove{background:transparent;color:#c6adb7;font-size:17px}
    .add{display:flex;gap:8px;margin-top:12px}.add input,.routine-form input{border:1px solid #f0dfe1;background:#fff;border-radius:14px;padding:11px 12px;color:var(--ink);min-width:0;outline:none;flex:1}.add input:focus,.routine-form input:focus{border-color:#e7afc1;box-shadow:0 0 0 3px #fff0f4}.add button,.save{border-radius:14px;padding:0 13px;background:#eeaac0;color:#fff;font-weight:700}
    .month-card{margin-top:18px;padding:18px;background:rgba(255,253,251,.82);border:1px solid rgba(255,255,255,.9);border-radius:25px;box-shadow:0 7px 22px rgba(151,107,121,.08)}.month-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.month-head h3{font:700 18px "Playpen Sans",cursive;margin:0}.mini-controls{display:flex;gap:6px}.mini{width:31px;height:31px;border-radius:50%;background:#fff;color:#936f82;font-size:18px;box-shadow:0 3px 9px rgba(120,83,99,.08)}.calendar-week,.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}.calendar-week{margin-bottom:5px;color:#ad94a0;font-size:10px;font-weight:800;text-transform:uppercase}.calendar-day{height:35px;border-radius:12px;background:transparent;color:#725f6a;font-weight:700;font-size:12px;transition:.18s}.calendar-day:hover{background:#fff0f4}.calendar-day.outside{color:#cfbfc5}.calendar-day.has-tasks:after{content:"";display:block;width:4px;height:4px;margin:2px auto 0;border-radius:50%;background:#ad95df}.calendar-day.selected{background:#efabc1;color:#fff;box-shadow:0 4px 10px #edb7c9}.calendar-day.selected:after{background:#fff}
    .side-card{background:linear-gradient(145deg,#fff6cc,#ffe5bf);position:relative;overflow:hidden}.side-card:after{content:"☀";position:absolute;right:-9px;top:-18px;font-size:92px;color:#fff0a7;opacity:.85}.side-card h3{position:relative;z-index:1}.progress-ring{--p:0;display:grid;place-items:center;width:114px;height:114px;border-radius:50%;margin:17px auto;background:conic-gradient(#e9a8ba calc(var(--p)*1%),#fff8de 0);position:relative;transition:.5s}.progress-ring:before{content:"";position:absolute;inset:10px;border-radius:50%;background:#fffaf0}.progress-ring span{position:relative;text-align:center;font:700 19px "Playpen Sans",cursive}.progress-ring small{display:block;font:700 10px "Nunito",sans-serif;color:#a88678}.quote{font:600 14px/1.45 "Playpen Sans",cursive;margin:21px 2px 1px;color:#80615a}.routine-view{display:none}.routine-view.show{display:block}.routine-form{display:flex;gap:8px;flex-wrap:wrap}.routine-form input{min-width:170px}.days{display:flex;gap:5px;flex-wrap:wrap;margin:14px 0}.daypick{width:37px;height:37px;border-radius:12px;background:#f8efff;color:#8a769b;font-weight:800;font-size:11px}.daypick.on{background:#c8b7ef;color:#fff}.routine-item{padding:13px 0;border-bottom:1px dashed #eedee1;display:flex;justify-content:space-between;align-items:center;font-weight:700}.routine-item small{display:block;color:var(--muted);font-weight:600;margin-top:3px}.empty{color:var(--muted);font-size:14px;padding:12px 0}.hide{display:none!important}
    @media(max-width:620px){.shell{padding:16px 14px calc(22px + var(--safe))}.top{gap:8px;margin-bottom:18px}.brand p{display:none}.hero{min-height:222px;padding:21px}.hero-copy{width:56%;max-width:none}.hero h2{font-size:24px}.hero p{font-size:12.5px}.cat-photo{width:44%;object-position:70% 50%}.s2{right:31%;top:10%}.content{grid-template-columns:1fr}.side-card{order:-1;display:flex;align-items:center;justify-content:space-between}.side-card h3{font-size:18px}.progress-ring{width:86px;height:86px;margin:2px}.progress-ring:before{inset:8px}.week{gap:6px}.day{min-width:49px}.nav h3{font:700 18px "Playpen Sans",cursive}}
    @media(max-width:430px){h1{font-size:20px}.tabs button{padding:8px 9px;font-size:12px}}
    @media(max-width:390px){h1{font-size:18px}.flower{font-size:26px}.hero h2{font-size:21px}.hero-copy{width:57%}.hero p{font-size:11.5px;line-height:1.42}.cat-photo{width:43%}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><div class="brand"><span class="flower">✿</span><div><h1>Puffy’s Business</h1><p id="dateLabel"></p></div></div><nav class="tabs"><button class="active" id="weekTab">Planner</button><button id="routineTab">Routines</button></nav></header>
    <section class="hero" id="hero"><div class="hero-copy"><span class="eyebrow">one small good thing</span><h2>Slow is still forward.</h2><p>Puffy keeps you company while you make space for what matters.</p></div><img class="cat-photo" alt="Relaxing ginger cat" src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=900&q=88"><i class="paw">🐾</i><i class="spark s1">✦</i><i class="spark s2">✧</i><i class="spark s3">✦</i></section>
    <section id="agenda"><div class="nav"><h3 id="range">Your week</h3><div class="nav-controls"><button class="round" id="prev" aria-label="Previous week">‹</button><button class="round" id="next" aria-label="Next week">›</button><button class="today" id="today">Today</button></div></div><div class="week" id="week"></div><section class="month-card"><div class="month-head"><h3 id="monthLabel">Calendar</h3><div class="mini-controls"><button class="mini" id="monthPrev" aria-label="Previous month">‹</button><button class="mini" id="monthNext" aria-label="Next month">›</button></div></div><div class="calendar-week"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div><div class="month-grid" id="monthGrid"></div></section><div class="content"><section class="panel"><div class="panel-head"><h3 id="dayTitle">Today</h3><span class="count" id="count">0 tasks</span></div><div id="tasks"></div><form class="add" id="addForm"><input id="taskInput" autocomplete="off" placeholder="Add one kind thing for today…"><button>Add</button></form></section><aside class="panel side-card"><div><h3>Your pace</h3><p class="quote" id="quote">“Starting is enough.”</p></div><div class="progress-ring" id="ring"><span id="progress">0<small>complete</small></span></div></aside></div></section>
    <section class="routine-view" id="routines"><div class="nav"><h3>Little things you repeat</h3></div><section class="panel"><form class="routine-form" id="routineForm"><input id="routineInput" placeholder="For example: walk, read, stretch"><button class="save">Save routine</button></form><div class="days" id="picks"></div><div id="routineList"></div></section></section>
  </main>
  <script>
  (() => {
    'use strict';
    const STORAGE_KEY = 'gentle_planner_v2';
    const dayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
    const dayShort = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const $ = selector => document.querySelector(selector);
    const dateKey = date => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    const dayIndex = date => (date.getDay() + 6) % 7;
    const addDays = (date, amount) => { const next = new Date(date); next.setDate(next.getDate() + amount); return next; };
    const startOfWeek = date => { const next = new Date(date); next.setHours(0, 0, 0, 0); return addDays(next, -dayIndex(next)); };
    const formatDay = date => date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });
    const today = new Date();
    let state = { tasks: {}, routines: [], routineDone: {} };
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && typeof saved === 'object') state = { ...state, ...saved };
    } catch (_) {}
    if (!state.tasks || typeof state.tasks !== 'object') state.tasks = {};
    if (!Array.isArray(state.routines)) state.routines = [];
    if (!state.routineDone || typeof state.routineDone !== 'object') state.routineDone = {};

    let weekStart = startOfWeek(today);
    let selectedIndex = dayIndex(today);
    let calendarMonth = new Date(today.getFullYear(), today.getMonth(), 1);
    let selectedRoutineDays = new Set();

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
    function selectedDate() { return addDays(weekStart, selectedIndex); }
    function entriesFor(date) {
      const key = dateKey(date);
      const routineStates = state.routineDone[key] || {};
      const routines = state.routines
        .filter(routine => Array.isArray(routine.days) && routine.days.includes(dayIndex(date)))
        .map(routine => ({ id: routine.id, name: routine.name, done: Boolean(routineStates[routine.id]), type: 'routine' }));
      const personal = (state.tasks[key] || []).map(task => ({ ...task, type: 'task' }));
      return [...routines, ...personal];
    }
    function hasEntries(date) { return entriesFor(date).length > 0; }
    function makeButton(className, text, label) {
      const button = document.createElement('button');
      button.type = 'button'; button.className = className; button.textContent = text;
      if (label) button.setAttribute('aria-label', label);
      return button;
    }
    function renderWeek() {
      const week = $('#week'); week.replaceChildren();
      for (let index = 0; index < 7; index += 1) {
        const date = addDays(weekStart, index);
        const button = makeButton(`day ${index === selectedIndex ? 'active' : ''} ${dateKey(date) === dateKey(today) ? 'today' : ''}`, '', `Choose ${dayNames[index]}`);
        button.innerHTML = `<b>${dayShort[index]}</b><span>${date.getDate()}</span>${entriesFor(date).some(entry => entry.done) ? '<i class="dot"></i>' : ''}`;
        button.addEventListener('click', () => { selectedIndex = index; calendarMonth = new Date(date.getFullYear(), date.getMonth(), 1); render(); });
        week.append(button);
      }
    }
    function renderCalendar() {
      $('#monthLabel').textContent = calendarMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      const grid = $('#monthGrid'); grid.replaceChildren();
      const firstCell = addDays(calendarMonth, -dayIndex(calendarMonth));
      for (let cell = 0; cell < 42; cell += 1) {
        const date = addDays(firstCell, cell);
        const isOutside = date.getMonth() !== calendarMonth.getMonth();
        const isSelected = dateKey(date) === dateKey(selectedDate());
        const button = makeButton(`calendar-day ${isOutside ? 'outside' : ''} ${hasEntries(date) ? 'has-tasks' : ''} ${isSelected ? 'selected' : ''}`, String(date.getDate()), `Choose ${formatDay(date)}`);
        button.addEventListener('click', () => { weekStart = startOfWeek(date); selectedIndex = dayIndex(date); calendarMonth = new Date(date.getFullYear(), date.getMonth(), 1); render(); });
        grid.append(button);
      }
    }
    function renderTasks() {
      const date = selectedDate();
      const entries = entriesFor(date);
      const completed = entries.filter(entry => entry.done).length;
      const isToday = dateKey(date) === dateKey(today);
      $('#dayTitle').textContent = isToday ? `Today, ${formatDay(date)}` : `${dayNames[dayIndex(date)]}, ${formatDay(date)}`;
      $('#count').textContent = entries.length ? `${completed} of ${entries.length} complete` : 'A quiet day';
      const list = $('#tasks'); list.replaceChildren();
      if (!entries.length) {
        const empty = document.createElement('p'); empty.className = 'empty'; empty.textContent = 'Nothing here yet. Leave a little space for play, too. ✿'; list.append(empty);
      }
      entries.forEach(entry => {
        const row = document.createElement('div'); row.className = `task ${entry.done ? 'done' : ''}`;
        const checkbox = makeButton('check', '', `Mark ${entry.name} as ${entry.done ? 'not done' : 'done'}`);
        const name = document.createElement('span'); name.className = 'name'; name.textContent = entry.name;
        const tag = document.createElement('span'); tag.className = 'tag'; tag.textContent = entry.type === 'routine' ? 'routine' : 'today';
        checkbox.addEventListener('click', () => toggleEntry(entry));
        row.append(checkbox, name, tag);
        if (entry.type === 'task') {
          const remove = makeButton('remove', '×', `Remove ${entry.name}`);
          remove.addEventListener('click', () => removeTask(entry.id)); row.append(remove);
        }
        list.append(row);
      });
      const percent = entries.length ? Math.round((completed / entries.length) * 100) : 0;
      $('#ring').style.setProperty('--p', percent);
      $('#progress').firstChild.nodeValue = `${percent}%`;
    }
    function renderRoutines() {
      const list = $('#routineList'); list.replaceChildren();
      if (!state.routines.length) {
        const empty = document.createElement('p'); empty.className = 'empty'; empty.textContent = 'No saved routines yet.'; list.append(empty); return;
      }
      state.routines.forEach(routine => {
        const item = document.createElement('div'); item.className = 'routine-item';
        const copy = document.createElement('div'); copy.textContent = routine.name;
        const schedule = document.createElement('small'); schedule.textContent = routine.days.map(index => dayShort[index]).join(' · '); copy.append(schedule);
        const remove = makeButton('remove', '×', `Remove ${routine.name}`);
        remove.addEventListener('click', () => { state.routines = state.routines.filter(item => item.id !== routine.id); save(); render(); });
        item.append(copy, remove); list.append(item);
      });
    }
    function render() {
      $('#dateLabel').textContent = today.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      $('#range').textContent = `Week of ${formatDay(weekStart)} — ${formatDay(addDays(weekStart, 6))}`;
      renderWeek(); renderCalendar(); renderTasks(); renderRoutines();
    }
    function toggleEntry(entry) {
      const key = dateKey(selectedDate());
      if (entry.type === 'routine') {
        if (!state.routineDone[key]) state.routineDone[key] = {};
        state.routineDone[key][entry.id] = !entry.done;
      } else {
        const task = (state.tasks[key] || []).find(item => item.id === entry.id);
        if (task) task.done = !task.done;
      }
      save(); render();
    }
    function removeTask(id) {
      const key = dateKey(selectedDate());
      state.tasks[key] = (state.tasks[key] || []).filter(task => task.id !== id); save(); render();
    }
    $('#addForm').addEventListener('submit', event => {
      event.preventDefault(); const input = $('#taskInput'); const name = input.value.trim(); if (!name) return;
      const key = dateKey(selectedDate()); if (!state.tasks[key]) state.tasks[key] = [];
      state.tasks[key].push({ id: `task-${Date.now()}-${Math.random().toString(16).slice(2)}`, name, done: false });
      input.value = ''; save(); render(); input.focus();
    });
    $('#prev').addEventListener('click', () => { weekStart = addDays(weekStart, -7); render(); });
    $('#next').addEventListener('click', () => { weekStart = addDays(weekStart, 7); render(); });
    $('#today').addEventListener('click', () => { weekStart = startOfWeek(today); selectedIndex = dayIndex(today); calendarMonth = new Date(today.getFullYear(), today.getMonth(), 1); render(); });
    $('#monthPrev').addEventListener('click', () => { calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1); renderCalendar(); });
    $('#monthNext').addEventListener('click', () => { calendarMonth = new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1); renderCalendar(); });
    function renderDayPickers() {
      const picks = $('#picks'); picks.replaceChildren();
      dayShort.forEach((day, index) => {
        const button = makeButton('daypick', day, `Repeat on ${dayNames[index]}`);
        button.addEventListener('click', () => { selectedRoutineDays.has(index) ? selectedRoutineDays.delete(index) : selectedRoutineDays.add(index); button.classList.toggle('on'); });
        picks.append(button);
      });
    }
    $('#routineForm').addEventListener('submit', event => {
      event.preventDefault(); const input = $('#routineInput'); const name = input.value.trim();
      if (!name || !selectedRoutineDays.size) return;
      state.routines.push({ id: `routine-${Date.now()}-${Math.random().toString(16).slice(2)}`, name, days: [...selectedRoutineDays].sort() });
      input.value = ''; selectedRoutineDays = new Set(); renderDayPickers(); save(); render();
    });
    function selectTab(name) {
      const routines = name === 'routines'; $('#agenda').classList.toggle('hide', routines); $('#routines').classList.toggle('show', routines);
      $('#weekTab').classList.toggle('active', !routines); $('#routineTab').classList.toggle('active', routines);
    }
    $('#weekTab').addEventListener('click', () => selectTab('planner'));
    $('#routineTab').addEventListener('click', () => selectTab('routines'));
    renderDayPickers(); render();
  })();
  </script>
</body></html>
